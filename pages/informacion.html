<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/stylesInformacion.css" />
    <title>Información</title>
  </head>
  <body>
    <h1>Información del lugar</h1>
    <p>Bienvenido a nuestro restaurante!</p>

    <p>Estamos ubicados en el corazón de la ciudad, cerca de los principales attractions turísticos.</p>

    <!--Formulario -->
    <div id="formulario">
    <form action="/submit" method="post">
      <label for="name">Nombre:</label>
      <input type="text" id="name" name="name" required />
      <br /> <br />
      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" required />
      <br /> <br />
      <input type="submit" value="Enviar" />
    </form>
    </div>
  </body>
</html>
