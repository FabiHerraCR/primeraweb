<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contacto - Restaurante La Argentina</title>

    <link rel="stylesheet" href="../css/stylesContacto.css" />
  </head>

  <body>
    <header>
      <h1>Contacto</h1>

      <p>Restaurante "La Argentina"</p>
    </header>

    <section class="contenedor">
      <h2>Envíanos un mensaje</h2>

      <form>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required />

        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" required />

        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje" rows="5" required></textarea>

        <button type="submit">Enviar mensaje</button>
      </form>
    </section>

    <section class="info">
      <h2>Información del restaurante</h2>

      <p><strong>Teléfono:</strong> +506 2222 2222</p>
      <p><strong>Correo:</strong> contacto@restaurante-la-argentina.com</p>
      <p><strong>Ubicación:</strong> Alajuela, Costa Rica</p>
    </section>

    <p class="volver">
      <a href="../index.html">Volver al inicio</a>
    </p>

    <footer>
      <p>
        ©2023 Restaurante "La Argentina". Todos los derechos reservados, Fabian
        Herra.
      </p>
    </footer>
  </body>
</html>
